# Container build configuration
# Used by launch.sh when --rebuild is enabled.
# Override path with: --config PATH or CONTAINER_BUILD_CONFIG env var.

[versions]
# Use "latest" to resolve dynamically at build time.
claude_code = "latest"
claude_agent_acp = "latest"
gh = "2.87.3"
fd = "10.3.0"
python = "3.14.3"
go = "1.26.1"
golangci_lint = "v2.11.1"

[builder]
# Resources allocated to the container builder process.
# Env vars BUILD_CPUS / BUILD_MEMORY override these.
cpus = 2
memory = "4g"

[features]
# Install claude-agent-acp for connecting Claude Code to Zed editor.
# Adds ~50MB to the image. Default is OFF.
install_claude_agent_acp = false
