# Per-project container runtime configuration
# Place this file as container-run.toml in your project root.
# CLI flags (--memory, --cpus) override these values.
# This file is read by launch.sh on every run (no image rebuild required).
#
# Defaults (when no config file or CLI flags are provided):
#   memory = "2g",  cpus = 4

[resources]
# Memory for the container VM (e.g., "2g", "8g", "512m")
memory = "4g"
# Number of CPUs for the container VM
cpus = 4

[claude]
# Sets CLAUDE_CODE_SIMPLE=1 at runtime — disables hooks, agents, session memory,
# attachments, and CLAUDE.md files inside the container.
# MCP servers registered via `claude mcp add` still work in simple mode.
#
# WARNING: Simple mode is incompatible with subscription (Plan) auth.
# Claude Code ignores Keychain credentials in simple mode and requires
# ANTHROPIC_API_KEY instead (API usage billing). Set to false for Plan billing.
#
# When false (full mode):
#   - Subscription credentials from macOS Keychain are used (Plan billing)
#   - Hooks, agents, session memory, CLAUDE.md are active
#   - Global hooks from ~/.claude/hooks will be copied into the container
#
claude_simple_mode = true

# Permission mode for Claude inside the container. Safe because the sandbox
# is ephemeral and isolated.
#
#   "yolo"  — --dangerously-skip-permissions (skip all prompts, full autonomy)
#   "plan"  — --permission-mode plan --allow-dangerously-skip-permissions
#             (start in plan mode, Claude can propose escalation to user)
#   "false" — normal interactive prompts (no special flags)
#
claude_skip_permissions = "yolo"

# Additional system prompt appended after the built-in CONTAINER.md prompt.
# Useful for project-specific instructions (e.g., "Always use pytest", "Prefer Go modules").
claude_additional_system_prompt = ""

# Model to use for the container session. Accepts aliases (sonnet, opus, haiku)
# or full model IDs (claude-haiku-4-5-20251001). Empty = use default from settings.json.
claude_model = "haiku"

# Initial prompt sent to Claude when the session starts.
# Useful for environment verification on a cheap model before switching.
claude_query = "Read @CONTAINER.md and verify environment. Check sudo, network access, timezone, github access"

[workspace]
# Additional patterns to exclude when copying workspace into the container.
# These are ADDED to the built-in defaults (.venv, node_modules, __pycache__, etc.)
# Each pattern is passed as --exclude to tar.
#
# Special case: "bin" excludes only the workspace-root ./bin/ directory.
# It does NOT exclude nested paths like src/bin or tools/bin.
#
# For explicit path control, prefer root-anchored patterns like "./dist".
additional_excludes = []

[environment]
# Timezone for the container (IANA format). Affects git timestamps, logs, etc.
# Default: Europe/Warsaw
timezone = "Europe/Warsaw"

[credentials]
# Git hosts to add to known_hosts via ssh-keyscan.
# Default (when empty or absent): github.com only.
ssh_known_hosts = ["github.com"]

[postgres]
# Enable Postgres MCP (HTTP) — connects to postgres-mcp running on host Mac.
# Requires: postgres-mcp running on host:
#   postgres-mcp -t http -port 8090 -ip 0.0.0.0 -dsn "postgresql://user:pass@localhost:5432/dbname" --read-only
#
# The container reaches the host via Apple Container gateway (192.168.64.1).
# No auth needed — local-only access, MCP server enforces read-only mode.
enabled = false
url = "http://192.168.64.1:8090/mcp"

[codex]
# Sandbox mode for Codex MCP server inside the container.
# Codex has its own Landlock sandbox — redundant inside an Apple Container.
# Passed as --sandbox flag to `codex mcp-server` AND written to ~/.codex/config.toml.
#
# NOTE: The --sandbox CLI flag and config.toml set the server default, but Claude
# can override sandbox mode per-call via MCP tool parameters (sandbox: "read-only").
# To truly enforce this, CONTAINER.md instructs Claude to always pass
# sandbox: "danger-full-access" in every Codex MCP call.
#
#   "danger-full-access" — no Landlock restrictions (recommended in container)
#   "workspace-write"    — can write in workspace only
#   "read-only"          — cannot write or execute (Codex needs data passed via prompt)
#
sandbox_mode = "danger-full-access"

[hooks]
# Enable Claude-hooks webhook integration.
# Hooks require full mode (claude_simple_mode = false).
# When active, sets WEBHOOK_HOST in the container and rewrites
# HTTP hook URLs in settings.json from localhost/127.0.0.1 to the gateway IP.
#
# Prerequisites:
#   1. Webhook server running on host: curl http://localhost:8765/health
#   2. Hooks deployed on host (~/.claude/hooks/ and .claude/hooks/)
enabled = false

# IP/hostname the container uses to reach the host's webhook server.
# Uses Apple Container gateway IP — same as Postgres MCP.
# The webhook server must bind to 0.0.0.0 (default) for this to work.
host = "192.168.64.1"

# Port the webhook server listens on.
port = 8765

# Register the Talk MCP server (HTTP transport) from the webhook server.
# Endpoint: http://{host}:{port}/mcp/
# Works even in simple mode — Talk is a plain HTTP MCP server, independent of hooks.
register_talk_mcp = true

[mcp]
# Enable MCP servers in the container.
# When enabled, remote MCP servers are registered via `claude mcp add --transport http`.
# Each server gets its own JWT token, extracted from macOS Keychain or environment.
enabled = false

# Base URL for remote MCP servers (shared across all entries).
base_url = "https://example.com"

# Remote MCP servers to register.
# Format: "name path keychain-service" — 3 fields separated by spaces.
# Full URL = base_url + path. Token is looked up by keychain-service name.
#
# Token resolution (first match wins):
#   1. macOS Keychain: security find-generic-password -s "mcp:pushover" -w
#   2. Environment variable: MCP_TOKEN_PUSHOVER (uppercased name after "mcp:")
#
# One-time Keychain setup per server:
#   security add-generic-password -s "mcp:pushover" -a "$USER" -w "TOKEN_HERE"
#   security add-generic-password -s "mcp:gemini"   -a "$USER" -w "TOKEN_HERE"
#
# Or via ~/.zshenv (fallback):
#   export MCP_TOKEN_PUSHOVER="TOKEN_HERE"
#   export MCP_TOKEN_GEMINI="TOKEN_HERE"
#
# Servers sharing a token reference the same keychain service (e.g., answer + gemini).
# IMPORTANT: Server names MUST match host names (no "-remote" suffix!) so that
# existing permissions in .claude/settings.local.json are honored inside the container.
servers = [
    "pushover /pushover/mcp/ mcp:pushover",
    "gemini /gemini/mcp/ mcp:gemini",
    "time /time/mcp/ mcp:time",
    "answer /answer/mcp/ mcp:gemini"
]
