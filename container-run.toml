# Per-project container runtime configuration
# Place this file as container-run.toml in your project root.
# CLI flags (--memory, --cpus) override these values.
#
# Defaults (when no config file or CLI flags are provided):
#   memory = "2g",  cpus = 4

[resources]
# Memory for the container VM (e.g., "2g", "8g", "512m")
memory = "2g"
# Number of CPUs for the container VM
cpus = 2

[claude]
# Sets CLAUDE_CODE_SIMPLE=1 at runtime — disables hooks, MCP servers, attachments,
# and CLAUDE.md files inside the container.
#
# To disable simple mode set claude_simple_mode = false, then:
#   - Ensure the image has uv and Python 3.12 (needed for hooks)
#   - Configure MCP servers in settings.json as desired (use http transport for MCP)
#   - Global hooks from ~/.claude/hooks will be copied into the container
#
claude_simple_mode = true

# Permission mode for Claude inside the container. Safe because the sandbox
# is ephemeral and isolated.
#
#   "yolo"  — --dangerously-skip-permissions (skip all prompts, full autonomy)
#   "plan"  — --permission-mode plan --allow-dangerously-skip-permissions
#             (start in plan mode, Claude can propose escalation to user)
#   "false" — normal interactive prompts (no special flags)
#
claude_skip_permissions = "false"

# Additional system prompt appended after the built-in CONTAINER.md prompt.
# Useful for project-specific instructions (e.g., "Always use pytest", "Prefer Go modules").
claude_additional_system_prompt = ""

# Model to use for the container session. Accepts aliases (sonnet, opus, haiku)
# or full model IDs (claude-haiku-4-5-20251001). Empty = use default from settings.json.
claude_model = "haiku"

# Initial prompt sent to Claude when the session starts.
# Useful for environment verification on a cheap model before switching.
claude_query = "Read @CONTAINER.md and verify environment. Check sudo, network access, timezone, github access"

[workspace]
# Additional patterns to exclude when copying workspace into the container.
# These are ADDED to the built-in defaults (.venv, node_modules, __pycache__, etc.)
# Each pattern is passed as --exclude to tar.
additional_excludes = ["bin"]

[environment]
# Timezone for the container (IANA format). Affects git timestamps, logs, etc.
timezone = "Europe/Warsaw"

[credentials]
# Git hosts to add to known_hosts via ssh-keyscan.
# Default (when empty or absent): github.com only.
ssh_known_hosts = ["github.com"]

[postgres]
# Enable Postgres MCP (HTTP) — connects to postgres-mcp running on host Mac.
# Requires: postgres-mcp running on host (e.g., postgres-mcp -t http -port 8090 -dsn "..." --read-only)
# The container reaches the host via Apple Container gateway (192.168.64.1).
enabled = false
url = "http://192.168.64.1:8090/mcp"

[mcp]
# Enable MCP servers in the container.
enabled = true

# Base URL for remote MCP servers (shared across all entries).
base_url = "https://karma.rrj.pl"

# Remote MCP servers to register via `claude mcp add --transport http`.
# Format: "name path keychain-service" — 3 fields separated by spaces.
# Full URL = base_url + path. Token is extracted from macOS Keychain by keychain-service.
# Servers sharing a token reference the same keychain service (e.g., answer + gemini).
# IMPORTANT: Server names MUST match host names (no "-remote" suffix!) so that
# existing permissions in .claude/settings.local.json are honored inside the container.
servers = [
    "pushover /pushover/mcp/ mcp:pushover",
    "gemini /gemini/mcp/ mcp:gemini",
    "time /time/mcp/ mcp:time",
    "answer /answer/mcp/ mcp:gemini"
]
